<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>My chat app</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Fira+Code:wght@400;500;600&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="css/style.css" />
</head>

<body>
	<div class="login-container">
		<!-- LEFT PANEL -->
		<div class="login-header">
			<div class="branding">
				<div class="logo-icon">
					<img src="./logo.svg" alt="Logo" />
				</div>
				<h1>My CHAT App</h1>
				<p>Connect with people. Join conversations. Be social.</p>
				<div class="terminal-line">
					<span class="prompt">$</span>
					<span class="cmd">chat --join</span>
					<span class="cursor">▊</span>
				</div>
			</div>
		</div>

		<!-- RIGHT PANEL -->
		<div class="login-main">
            <form id="enter-chat" action="#">
                <div class="form-title">
                    <span class="bracket">[</span>
                    <h2 id="form-title-text">Welcome Back</h2>
				</div>

				<div class="form-control">
					<label><span class="label-prefix">//</span> Username</label>
					<input type="text" name="username" id="username" placeholder="your_username" required />
				</div>
				<div class="form-control">
					<label><span class="label-prefix">//</span> Password</label>
					<input type="password" name="password" id="password" placeholder="••••••••" required />
				</div>

				<div class="form-control">
					<label><span class="label-prefix">//</span> Room</label>
					<select name="room" id="room">
						<option value="" disabled selected>Loading rooms…</option>
					</select>
				</div>

				<div class="form-toggle">
					<button type="button" class="link-btn" id="toggle-mode">Switch to register</button>
				</div>
				<p class="form-message" id="form-message"></p>

				<button type="submit" class="btn">
					<span id="submit-text">Enter Chat</span>
					<svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor">
						<path fill-rule="evenodd"
							d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
							clip-rule="evenodd" />
					</svg>
				</button>
			</form>
		</div>
	</div>
    <script src="js/login.js" defer></script>
